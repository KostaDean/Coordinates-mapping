<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coordinate Mapper</title>
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #111; color: #f2f2f2; }
  .toolbar { position: sticky; top: 0; z-index: 10; background: #1c1c1c; border-bottom: 1px solid #333; padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  label { font-size: 16px; }
  select, input[type='number'], input[type='text'], textarea {
    font-size: 16px; padding: 8px 10px; border-radius: 10px; border: 1px solid #555; background: #fff; color: #111;
  }
  input[type='number'] { width: 78px; }
  input[type='text'] { width: 180px; }
  textarea { width: 100%; min-height: 56px; resize: vertical; }
  button { font-size: 16px; padding: 10px 14px; border-radius: 999px; border: 1px solid #666; background: #eee; color: #111; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 10px; }
  .board-wrap { position: relative; width: 100%; background: #000; border: 1px solid #444; overflow: hidden; min-height: 300px; }
  #board { display: block; width: 100%; height: auto; max-width: 100%; }
  #overlay { position: absolute; inset: 0; touch-action: manipulation; }
  #output { width: 100%; min-height: 220px; margin-top: 12px; padding: 12px; background: #000; color: #8ef58e; border: 1px solid #333; border-radius: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; line-height: 1.35; }
  .status { margin-top: 8px; color: #bdbdbd; font-size: 14px; }
  .hint { color: #bdbdbd; font-size: 14px; line-height: 1.4; margin-top: 8px; }
  .queuebox { margin-top: 10px; background: #0f0f0f; border: 1px solid #333; border-radius: 10px; padding: 10px 12px; }
  .queuehead { color: #bdbdbd; font-size: 14px; margin-bottom: 6px; }
  .queueitem { font-size: 18px; line-height: 1.5; color: #ddd; word-break: break-word; }
  .queueitem.current { font-weight: 800; color: #ffe66d; background: rgba(255,230,109,0.10); padding: 3px 6px; border-radius: 6px; }
  .queueitem.done { color: #777; text-decoration: line-through; }
</style>
</head>
<body>
  <div class="toolbar">
    <label for="mode">Mode:</label>
    <select id="mode">
      <option value="center">Compartment center</option>
      <option value="symbol">Symbol slot</option>
    </select>

    <label for="radius">Radius:</label>
    <input id="radius" type="number" value="12" min="1" max="100" step="1" />

    <button id="startBtn" type="button">Start Mapping</button>
    <button id="undoBtn" type="button">Undo</button>
    <button id="clearBtn" type="button">Clear All</button>
    <button id="exportBtn" type="button">Export JSON</button>
    <button id="copyBtn" type="button">Copy JSON</button>
    <button id="importBtn" type="button">Import JSON</button>

    <div style="flex-basis:100%"></div>

    <label for="imgSrc">Image file:</label>
    <input id="imgSrc" type="text" value="A.spiral.jpg" />
    <button id="loadImageBtn" type="button">Load Image</button>
    <input id="filePicker" type="file" accept="image/*" />

    <div style="flex-basis:100%"></div>

    <label for="labels">Labels:</label>
    <textarea id="labels" placeholder="Enter labels separated by ; or new line, e.g. R1; R1_S12_a; T3_S29_b"></textarea>
  </div>

  <div class="wrap">
    <div class="queuebox">
      <div class="queuehead">Tap queue</div>
      <div id="queueDisplay"></div>
    </div>

    <div class="board-wrap">
      <img id="board" alt="Board image">
      <canvas id="overlay"></canvas>
    </div>

    <div class="status" id="status">Ready.</div>

    <textarea id="output" placeholder="Exported JSON appears here..."></textarea>

    <div class="hint">
      The Disk shows circles only. Labels stay off the Disk. After you press <b>Start Mapping</b>, the next tap label is highlighted in the queue above while the full list remains visible.
    </div>
  </div>

<script>
(() => {
  const STORAGE_KEY_POINTS = 'coord_mapper_saved_points_v6';
  const STORAGE_KEY_IMAGE = 'coord_mapper_image_v6';
  const board = document.getElementById('board');
  const overlay = document.getElementById('overlay');
  const ctx = overlay.getContext('2d');
  const modeEl = document.getElementById('mode');
  const radiusEl = document.getElementById('radius');
  const labelsEl = document.getElementById('labels');
  const outputEl = document.getElementById('output');
  const statusEl = document.getElementById('status');
  const imgSrcEl = document.getElementById('imgSrc');
  const filePicker = document.getElementById('filePicker');
  const queueDisplay = document.getElementById('queueDisplay');

  let points = {};
  let history = [];
  let queue = [];
  let originalQueue = [];
  let objectURL = null;

  function setStatus(msg) { statusEl.textContent = msg; }
  function savePoints() { localStorage.setItem(STORAGE_KEY_POINTS, JSON.stringify(points)); }
  function loadPoints() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY_POINTS);
      points = raw ? JSON.parse(raw) : {};
    } catch (e) { points = {}; }
  }
  function saveImageName(name) { localStorage.setItem(STORAGE_KEY_IMAGE, name); }
  function loadSavedImageName() { return localStorage.getItem(STORAGE_KEY_IMAGE) || ''; }

  function fitCanvas() {
    const rect = board.getBoundingClientRect();
    overlay.width = Math.round(rect.width);
    overlay.height = Math.round(rect.height);
    redrawAll();
  }

  function eventToImageCoords(evt) {
    const rect = overlay.getBoundingClientRect();
    const x = (evt.clientX - rect.left) * (board.naturalWidth / rect.width);
    const y = (evt.clientY - rect.top) * (board.naturalHeight / rect.height);
    return { x: Math.round(x), y: Math.round(y) };
  }

  function imageToCanvas(x, y) {
    return {
      x: x * (overlay.width / board.naturalWidth),
      y: y * (overlay.height / board.naturalHeight)
    };
  }

  function drawPoint(label, p) {
    const c = imageToCanvas(p.x, p.y);
    const scale = overlay.width / board.naturalWidth;
    const r = Math.max(4, p.r * scale);
    ctx.beginPath();
    ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
    ctx.fillStyle = p.mode === 'center' ? 'rgba(0,140,255,0.28)' : 'rgba(255,70,70,0.35)';
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = p.mode === 'center' ? 'rgba(80,190,255,0.95)' : 'rgba(255,255,255,0.95)';
    ctx.stroke();
  }

  function redrawAll() {
    ctx.clearRect(0, 0, overlay.width, overlay.height);
    Object.entries(points).forEach(([label, p]) => drawPoint(label, p));
  }

  function parseLabels() {
    return labelsEl.value.split(/[\n;]+/).map(s => s.trim()).filter(Boolean);
  }

  function renderQueue() {
    const all = originalQueue.length ? originalQueue : parseLabels();
    const current = queue.length ? queue[0] : null;
    const doneCount = originalQueue.length - queue.length;
    queueDisplay.innerHTML = '';
    if (!all.length) {
      queueDisplay.innerHTML = '<div class="queueitem">No labels entered.</div>';
      return;
    }
    all.forEach((label, idx) => {
      const div = document.createElement('div');
      div.className = 'queueitem';
      if (idx < doneCount) div.classList.add('done');
      if (label === current && idx === doneCount) div.classList.add('current');
      div.textContent = label;
      queueDisplay.appendChild(div);
    });
  }

  function startMapping() {
    queue = parseLabels();
    originalQueue = [...queue];
    setStatus(queue.length ? `Ready to place ${queue.length} label(s).` : 'No labels entered.');
    renderQueue();
  }

  function exportJSON() {
    const obj = { image: { file: imgSrcEl.value.trim(), width: board.naturalWidth || 0, height: board.naturalHeight || 0 }, points };
    outputEl.value = JSON.stringify(obj, null, 2);
    setStatus('JSON exported.');
  }

  function loadImageFromName(src) {
    if (!src) { setStatus('Enter an image file name first.'); return; }
    board.onload = () => { fitCanvas(); saveImageName(src); setStatus(`Loaded image: ${src}`); };
    board.onerror = () => { setStatus(`Could not load image: ${src}`); alert('Image could not be loaded. Check the file name and extension exactly.'); };
    board.src = src;
  }

  function clearObjectURL() {
    if (objectURL) { URL.revokeObjectURL(objectURL); objectURL = null; }
  }

  function importJSON() {
    const pasted = prompt('Paste previously exported JSON here:');
    if (!pasted) return;
    try {
      const obj = JSON.parse(pasted);
      points = obj.points || {};
      savePoints();
      outputEl.value = JSON.stringify(obj, null, 2);
      if (obj.image && obj.image.file) {
        imgSrcEl.value = obj.image.file;
        if (!String(obj.image.file).startsWith('blob:')) {
          loadImageFromName(obj.image.file);
        } else {
          redrawAll();
          setStatus('JSON imported. Image path is a temporary blob URL, so choose the image again with the file picker or type the file name and tap Load Image.');
        }
      } else {
        redrawAll();
        setStatus('JSON imported.');
      }
      renderQueue();
    } catch (e) { alert('Invalid JSON.'); }
  }

  document.getElementById('loadImageBtn').addEventListener('click', () => {
    clearObjectURL();
    loadImageFromName(imgSrcEl.value.trim());
  });

  filePicker.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    clearObjectURL();
    objectURL = URL.createObjectURL(file);
    imgSrcEl.value = file.name;
    board.onload = () => { fitCanvas(); setStatus(`Loaded image from file picker: ${file.name}`); };
    board.src = objectURL;
  });

  document.getElementById('startBtn').addEventListener('click', startMapping);
  labelsEl.addEventListener('input', () => {
    if (!queue.length) renderQueue();
  });

  overlay.addEventListener('click', (evt) => {
    if (!board.naturalWidth || !board.naturalHeight) { setStatus('Load the image first.'); return; }
    if (!queue.length) { setStatus('Enter labels and tap Start Mapping first.'); return; }
    const label = queue.shift();
    const coords = eventToImageCoords(evt);
    const point = { x: coords.x, y: coords.y, r: Number(radiusEl.value) || 12, mode: modeEl.value };
    if (points[label]) history.push({ type: 'replace', label, oldValue: { ...points[label] } });
    else history.push({ type: 'add', label });
    points[label] = point;
    savePoints();
    redrawAll();
    renderQueue();
    setStatus(`Saved ${label} at (${coords.x}, ${coords.y}). ${queue.length} remaining.`);
  });

  document.getElementById('undoBtn').addEventListener('click', () => {
    const last = history.pop();
    if (!last) { setStatus('Nothing to undo.'); return; }
    if (last.type === 'add') delete points[last.label];
    else points[last.label] = last.oldValue;
    if (originalQueue.length) queue.unshift(last.label);
    savePoints();
    redrawAll();
    renderQueue();
    setStatus('Undo complete.');
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm('Clear all mapped points?')) return;
    points = {};
    history = [];
    queue = [];
    originalQueue = [];
    savePoints();
    redrawAll();
    outputEl.value = '';
    renderQueue();
    setStatus('All points cleared.');
  });

  document.getElementById('exportBtn').addEventListener('click', exportJSON);
  document.getElementById('copyBtn').addEventListener('click', async () => {
    if (!outputEl.value.trim()) exportJSON();
    try {
      await navigator.clipboard.writeText(outputEl.value);
      setStatus('JSON copied.');
    } catch (e) {
      outputEl.focus();
      outputEl.select();
      document.execCommand('copy');
      setStatus('JSON copied.');
    }
  });
  document.getElementById('importBtn').addEventListener('click', importJSON);

  board.addEventListener('load', fitCanvas);
  window.addEventListener('resize', fitCanvas);

  loadPoints();
  const savedImage = loadSavedImageName();
  if (savedImage) {
    imgSrcEl.value = savedImage;
    loadImageFromName(savedImage);
  }
  renderQueue();
})();
</script>
</body>
</html>
