<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coordinate Mapper v13</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#111;color:#f2f2f2}
.toolbar{position:sticky;top:0;z-index:10;background:#1c1c1c;border-bottom:1px solid #333;padding:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
label{font-size:16px}
select,input[type='number'],input[type='text'],textarea{font-size:16px;padding:8px 10px;border-radius:10px;border:1px solid #555;background:#fff;color:#111}
input[type='number']{width:78px}
input[type='text']{width:190px}
button{font-size:16px;padding:10px 14px;border-radius:999px;border:1px solid #666;background:#eee;color:#111}
.wrap{max-width:980px;margin:0 auto;padding:10px}
.board-wrap{position:relative;width:100%;background:#000;border:1px solid #444;overflow:hidden;min-height:300px}
#board{display:block;width:100%;height:auto;max-width:100%}
#overlay{position:absolute;inset:0;touch-action:manipulation}
#output{width:100%;min-height:220px;margin-top:12px;padding:12px;background:#000;color:#8ef58e;border:1px solid #333;border-radius:10px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;line-height:1.35}
.status{margin-top:8px;color:#bdbdbd;font-size:14px}
.hint{color:#bdbdbd;font-size:14px;line-height:1.4;margin-top:8px}
.marker-info{margin-top:8px;background:#0f0f0f;border:1px solid #333;border-radius:10px;padding:10px 12px;font-size:16px;line-height:1.45}
.marker-info .current{font-weight:800;color:#ffe66d}
.hoverTag{position:absolute;pointer-events:none;background:rgba(0,0,0,.82);color:#ffe66d;border:1px solid #666;border-radius:8px;padding:6px 8px;font-size:16px;font-weight:700;display:none;transform:translate(-50%,-140%);white-space:nowrap}
.labelsbox{width:100%;min-height:72px}
</style>
</head>
<body>
<div class="toolbar">
<label for="mode">Mode:</label>
<select id="mode"><option value="center">Compartment center</option><option value="symbol">Symbol slot</option></select>
<label for="radius">Radius:</label>
<input id="radius" type="number" value="12" min="1" max="100" step="1">
<button id="startBtn" type="button">Start Mapping</button>
<button id="undoBtn" type="button">Undo</button>
<button id="clearBtn" type="button">Clear All</button>
<button id="exportBtn" type="button">Export JSON</button>
<button id="copyBtn" type="button">Copy JSON</button>
<button id="importBtn" type="button">Import JSON</button>

<div style="flex-basis:100%"></div>

<label for="imgSrc">Image file:</label>
<input id="imgSrc" type="text" value="A.spiral.jpg">
<button id="loadImageBtn" type="button">Load Image</button>
<input id="filePicker" type="file" accept="image/*">

<div style="flex-basis:100%"></div>

<label for="labelsInput">Labels:</label>
<textarea id="labelsInput" class="labelsbox" placeholder="Use ; or new lines, e.g. T10_S02_a; T10_S12_b"></textarea>
</div>

<div class="wrap">
<div class="marker-info">Next tap: <span id="currentLabel" class="current">—</span><br>Remaining: <span id="remainingCount">0</span></div>
<div class="board-wrap">
<img id="board" alt="Board image">
<canvas id="overlay"></canvas>
<div id="hoverTag" class="hoverTag"></div>
</div>
<div class="status" id="status">Ready.</div>
<textarea id="output" placeholder="Exported JSON appears here..."></textarea>
<div class="hint">Typing in Labels is now plain text only, so the cursor stays where you put it. When mapping starts, completed labels are removed from the list. Semicolons and new lines both work.</div>
</div>

<script>
(() => {
const KEYS_POINTS=['coord_mapper_points_v13','coord_mapper_points_v12','coord_mapper_points_v11','coord_mapper_points_v10','coord_mapper_points_v9','coord_mapper_points_v8','coord_mapper_saved_points_v7','coord_mapper_saved_points_v6','coord_mapper_saved_points_v5','coord_mapper_saved_points_v4','coord_mapper_saved_points_v3','coordmap_points_v2'];
const KEYS_IMAGE=['coord_mapper_image_v13','coord_mapper_image_v12','coord_mapper_image_v11','coord_mapper_image_v10','coord_mapper_image_v9','coord_mapper_image_v8','coord_mapper_image_v7','coord_mapper_image_v6','coord_mapper_image_v5','coord_mapper_image_v4','coordmap_image_src_v2'];
const KEYS_OUTPUT=['coord_mapper_output_v13','coord_mapper_output_v12','coord_mapper_output_v11','coord_mapper_output_v10','coord_mapper_output_v9','coord_mapper_output_v8'];
const SAVE_POINTS_KEY='coord_mapper_points_v13';
const SAVE_IMAGE_KEY='coord_mapper_image_v13';
const SAVE_OUTPUT_KEY='coord_mapper_output_v13';

const board=document.getElementById('board');
const overlay=document.getElementById('overlay');
const ctx=overlay.getContext('2d');
const radiusEl=document.getElementById('radius');
const modeEl=document.getElementById('mode');
const labelsInput=document.getElementById('labelsInput');
const outputEl=document.getElementById('output');
const statusEl=document.getElementById('status');
const imgSrcEl=document.getElementById('imgSrc');
const filePicker=document.getElementById('filePicker');
const currentLabelEl=document.getElementById('currentLabel');
const remainingCountEl=document.getElementById('remainingCount');
const hoverTag=document.getElementById('hoverTag');

let points={}, history=[], queue=[], objectURL=null, holdTimer=null;

function firstStored(keys){for(const k of keys){const v=localStorage.getItem(k); if(v) return v;} return '';}
function setStatus(msg){statusEl.textContent=msg;}
function savePoints(){localStorage.setItem(SAVE_POINTS_KEY,JSON.stringify(points));}
function loadPoints(){const raw=firstStored(KEYS_POINTS); if(!raw){points={}; return;} try{points=JSON.parse(raw)||{};}catch(e){points={};}}
function saveImageName(name){localStorage.setItem(SAVE_IMAGE_KEY,name);}
function loadSavedImageName(){return firstStored(KEYS_IMAGE);}
function saveOutput(){localStorage.setItem(SAVE_OUTPUT_KEY,outputEl.value||'');}
function loadOutput(){outputEl.value=firstStored(KEYS_OUTPUT)||'';}

function fitCanvas(){const rect=board.getBoundingClientRect(); overlay.width=Math.round(rect.width); overlay.height=Math.round(rect.height); redrawAll();}
function eventToImageCoords(evt){const rect=overlay.getBoundingClientRect(); const x=(evt.clientX-rect.left)*(board.naturalWidth/rect.width); const y=(evt.clientY-rect.top)*(board.naturalHeight/rect.height); return {x:Math.round(x),y:Math.round(y)};}
function imageToCanvas(x,y){return {x:x*(overlay.width/board.naturalWidth),y:y*(overlay.height/board.naturalHeight)};}
function drawPoint(label,p){const c=imageToCanvas(p.x,p.y); const scale=overlay.width/board.naturalWidth; const r=Math.max(4,p.r*scale); ctx.beginPath(); ctx.arc(c.x,c.y,r,0,Math.PI*2); ctx.fillStyle=p.mode==='center'?'rgba(0,140,255,.28)':'rgba(255,70,70,.35)'; ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle=p.mode==='center'?'rgba(80,190,255,.95)':'rgba(255,255,255,.95)'; ctx.stroke();}
function redrawAll(){ctx.clearRect(0,0,overlay.width,overlay.height); Object.entries(points).forEach(([label,p])=>drawPoint(label,p));}
function parseLabels(text){return text.split(/[;\n]+/).map(s=>s.trim()).filter(Boolean);}
function updateQueueDisplay(){currentLabelEl.textContent=queue.length?queue[0]:'—'; remainingCountEl.textContent=String(queue.length);}
function startMapping(){queue=parseLabels(labelsInput.value); setStatus(queue.length?`Ready to place ${queue.length} label(s).`:'No labels entered.'); updateQueueDisplay();}
function exportJSON(){const obj={image:{file:imgSrcEl.value.trim(),width:board.naturalWidth||0,height:board.naturalHeight||0},points}; outputEl.value=JSON.stringify(obj,null,2); saveOutput(); setStatus('JSON exported.');}
function loadImageFromName(src){if(!src){setStatus('Enter an image file name first.'); return;} board.onload=()=>{fitCanvas(); saveImageName(src); setStatus(`Loaded image: ${src}`);}; board.onerror=()=>{setStatus(`Could not load image: ${src}`); alert('Image could not be loaded. Check the file name and extension exactly.');}; board.src=src;}
function clearObjectURL(){if(objectURL){URL.revokeObjectURL(objectURL); objectURL=null;}}
function importJSON(){const pasted=prompt('Paste previously exported JSON here:'); if(!pasted) return; try{const obj=JSON.parse(pasted); points=obj.points||{}; savePoints(); outputEl.value=JSON.stringify(obj,null,2); saveOutput(); if(obj.image&&obj.image.file){imgSrcEl.value=obj.image.file; if(!String(obj.image.file).startsWith('blob:')) loadImageFromName(obj.image.file); else {redrawAll(); setStatus('JSON imported. Image path is a temporary blob URL, so choose the image again with the file picker or type the file name and tap Load Image.');}} else {redrawAll(); setStatus('JSON imported.');}}catch(e){alert('Invalid JSON.');}}
function findNearestPointLabel(clientX,clientY){if(!board.naturalWidth||!board.naturalHeight) return null; const rect=overlay.getBoundingClientRect(); const cx=clientX-rect.left, cy=clientY-rect.top; let best=null,bestDist=Infinity; for(const [label,p] of Object.entries(points)){const c=imageToCanvas(p.x,p.y); const dist=Math.hypot(c.x-cx,c.y-cy); const threshold=Math.max(18,(p.r||8)*(overlay.width/board.naturalWidth)+10); if(dist<=threshold && dist<bestDist){bestDist=dist; best={label,x:c.x,y:c.y};}} return best;}
function showHoverTag(clientX,clientY){const found=findNearestPointLabel(clientX,clientY); if(!found) return; hoverTag.textContent=found.label; hoverTag.style.left=`${found.x}px`; hoverTag.style.top=`${found.y}px`; hoverTag.style.display='block';}
function hideHoverTag(){hoverTag.style.display='none';}

document.getElementById('loadImageBtn').addEventListener('click',()=>{clearObjectURL(); loadImageFromName(imgSrcEl.value.trim());});
filePicker.addEventListener('change',(e)=>{const file=e.target.files&&e.target.files[0]; if(!file) return; clearObjectURL(); objectURL=URL.createObjectURL(file); imgSrcEl.value=file.name; board.onload=()=>{fitCanvas(); setStatus(`Loaded image from file picker: ${file.name}`);}; board.src=objectURL;});
document.getElementById('startBtn').addEventListener('click',startMapping);

overlay.addEventListener('click',(evt)=>{
  if(!board.naturalWidth||!board.naturalHeight){setStatus('Load the image first.'); return;}
  if(!queue.length){setStatus('Enter labels and tap Start Mapping first.'); return;}
  const label=queue.shift();
  const coords=eventToImageCoords(evt);
  const point={x:coords.x,y:coords.y,r:Number(radiusEl.value)||12,mode:modeEl.value};
  if(points[label]) history.push({type:'replace',label,oldValue:{...points[label]}});
  else history.push({type:'add',label});
  points[label]=point;
  savePoints();
  redrawAll();
  labelsInput.value = queue.join('; ');
  updateQueueDisplay();
  setStatus(`Saved ${label} at (${coords.x}, ${coords.y}). ${queue.length} remaining.`);
});

function pointerDown(e){const pt=e.touches?e.touches[0]:e; hideHoverTag(); holdTimer=setTimeout(()=>showHoverTag(pt.clientX,pt.clientY),450);}
function pointerUp(){clearTimeout(holdTimer); setTimeout(hideHoverTag,700);}
overlay.addEventListener('mousedown',pointerDown);
overlay.addEventListener('touchstart',pointerDown,{passive:true});
overlay.addEventListener('mouseup',pointerUp);
overlay.addEventListener('mouseleave',pointerUp);
overlay.addEventListener('touchend',pointerUp);
overlay.addEventListener('touchcancel',pointerUp);

document.getElementById('undoBtn').addEventListener('click',()=>{
  const last=history.pop();
  if(!last){setStatus('Nothing to undo.'); return;}
  if(last.type==='add') delete points[last.label];
  else points[last.label]=last.oldValue;
  queue.unshift(last.label);
  savePoints();
  redrawAll();
  labelsInput.value = queue.join('; ');
  updateQueueDisplay();
  setStatus('Undo complete.');
});

document.getElementById('clearBtn').addEventListener('click',()=>{
  if(!confirm('Clear all mapped points?')) return;
  points={}; history=[]; queue=[];
  savePoints();
  redrawAll();
  outputEl.value=''; saveOutput();
  labelsInput.value='';
  currentLabelEl.textContent='—';
  remainingCountEl.textContent='0';
  setStatus('All points cleared.');
});

document.getElementById('exportBtn').addEventListener('click',exportJSON);
document.getElementById('copyBtn').addEventListener('click',async()=>{
  if(!outputEl.value.trim()) exportJSON();
  try{await navigator.clipboard.writeText(outputEl.value); setStatus('JSON copied.');}
  catch(e){outputEl.focus(); outputEl.select(); document.execCommand('copy'); setStatus('JSON copied.');}
});
document.getElementById('importBtn').addEventListener('click',importJSON);
outputEl.addEventListener('input',saveOutput);
board.addEventListener('load',fitCanvas);
window.addEventListener('resize',fitCanvas);

loadPoints();
loadOutput();
const savedImage=loadSavedImageName()||imgSrcEl.value.trim()||'A.spiral.jpg';
imgSrcEl.value=savedImage;
loadImageFromName(savedImage);
labelsInput.value='';
updateQueueDisplay();
})();
</script>
</body>
</html>
