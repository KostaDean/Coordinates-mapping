<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coordinate Mapper</title>
<style>
  body { font-family: sans-serif; margin: 10px; }
  canvas { border: 1px solid #ccc; width: 100%; height: auto; }
  textarea { width: 100%; font-size: 16px; margin-bottom: 10px; }
  button { margin: 5px 0; padding: 8px; }
</style>
</head>
<body>

<h3>Coordinate Mapper</h3>

<textarea id="labelInput" rows="2" placeholder="Enter labels separated by ; or new line"></textarea>

<br>
<button onclick="startMapping()">Start Mapping</button>
<button onclick="exportJSON()">Export JSON</button>
<button onclick="importJSON()">Import JSON</button>

<canvas id="canvas"></canvas>

<script>
let labels = [];
let currentIndex = 0;
let points = {};

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const img = new Image();
img.src = 'A.spiral.jpg';
img.onload = () => {
  canvas.width = img.width;
  canvas.height = img.height;
  draw();
};

function startMapping() {
  const input = document.getElementById('labelInput').value;
  labels = input.split(/[\n;]+/).map(s => s.trim()).filter(s => s.length);
  currentIndex = 0;
}

canvas.addEventListener('click', function(e) {
  if (currentIndex >= labels.length) return;

  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);

  const label = labels[currentIndex];
  points[label] = {x: Math.round(x), y: Math.round(y)};
  currentIndex++;

  draw();
});

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0);

  ctx.fillStyle = 'red';
  ctx.font = '12px sans-serif';

  for (let key in points) {
    let p = points[key];
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, 2*Math.PI);
    ctx.fill();
    ctx.fillText(key, p.x + 6, p.y);
  }
}

function exportJSON() {
  const data = JSON.stringify(points, null, 2);
  alert(data);
}

function importJSON() {
  const input = prompt("Paste JSON:");
  if (!input) return;
  points = JSON.parse(input);
  draw();
}
</script>

</body>
</html>
