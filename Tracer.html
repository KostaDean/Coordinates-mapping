<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracer v4 (Zoom + Color Control)</title>
<style>
body { margin:0; background:#111; color:#eee; font-family:Arial; }
.top { padding:10px; background:#222; display:flex; flex-wrap:wrap; gap:8px; }
button, input { padding:8px; font-size:16px; }
canvas { display:block; background:#000; touch-action:none; }
</style>
</head>
<body>

<div class="top">
<input type="file" id="file">
<label>Stroke</label><input type="color" id="stroke" value="#ffffff">
<label>Fill</label><input type="color" id="fill" value="#ff0000">
<button onclick="startDraw()">Draw</button>
<button onclick="finish()">Save</button>
<button onclick="exportJSON()">Export</button>
</div>

<canvas id="c"></canvas>

<script>
let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");

let img = new Image();
let shapes = [];
let path = [];
let drawing = false;

let scale = 1;
let offsetX = 0, offsetY = 0;
let isPanning = false;
let lastX=0, lastY=0;

document.getElementById("file").onchange = e=>{
  let f = e.target.files[0];
  let url = URL.createObjectURL(f);
  img.onload = ()=>{
    canvas.width = img.width;
    canvas.height = img.height;
    draw();
  }
  img.src = url;
}

function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.setTransform(scale,0,0,scale,offsetX,offsetY);
  ctx.drawImage(img,0,0);

  for(let s of shapes){
    ctx.beginPath();
    ctx.moveTo(s[0].x, s[0].y);
    for(let p of s) ctx.lineTo(p.x,p.y);
    ctx.closePath();
    ctx.fillStyle = s.fill;
    ctx.fill();
    ctx.strokeStyle = s.stroke;
    ctx.stroke();
  }

  if(path.length){
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for(let p of path) ctx.lineTo(p.x,p.y);
    ctx.strokeStyle="yellow";
    ctx.stroke();
  }
}

function startDraw(){ drawing=true; path=[]; }

function finish(){
  if(path.length<3) return;
  path.fill = document.getElementById("fill").value;
  path.stroke = document.getElementById("stroke").value;
  shapes.push(path);
  path=[];
  drawing=false;
  draw();
}

canvas.onpointerdown = e=>{
  if(drawing){
    path.push(getPos(e));
  } else {
    isPanning=true;
    lastX=e.clientX; lastY=e.clientY;
  }
}

canvas.onpointermove = e=>{
  if(drawing){
    path.push(getPos(e));
    draw();
  } else if(isPanning){
    offsetX += (e.clientX-lastX)/scale;
    offsetY += (e.clientY-lastY)/scale;
    lastX=e.clientX; lastY=e.clientY;
    draw();
  }
}

canvas.onpointerup = ()=>{ isPanning=false; }

canvas.onwheel = e=>{
  e.preventDefault();
  let zoom = e.deltaY<0 ? 1.1 : 0.9;
  scale *= zoom;
  draw();
}

function getPos(e){
  let rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX-rect.left)/scale - offsetX,
    y: (e.clientY-rect.top)/scale - offsetY
  }
}

function exportJSON(){
  let data = JSON.stringify(shapes);
  navigator.clipboard.writeText(data);
  alert("Copied JSON");
}
</script>

</body>
</html>
